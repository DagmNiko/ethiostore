{% extends 'dashboard/base.html' %}
{% load static %}

{% block body %}
<div class="flex min-h-screen bg-brand-dark">
    <!-- Main Form Area -->
    <div class="flex flex-1 flex-col justify-center px-4 py-12 sm:px-6 lg:flex-none lg:px-20 xl:px-24">
        <div class="mx-auto w-full max-w-sm lg:w-96">
            <!-- Tailwind CSS (CDN for Dev) -->
            <script>
                tailwind.config = {
                    darkMode: 'class',
                    theme: {
                        extend: {
                            colors: {
                                brand: {
                                    dark: 'rgb(var(--brand-dark) / <alpha-value>)',
                                    darker: 'rgb(var(--brand-darker) / <alpha-value>)',
                                    card: 'rgb(var(--brand-card) / <alpha-value>)',
                                    green: 'rgb(var(--brand-green) / <alpha-value>)',
                                    cyan: 'rgb(var(--brand-cyan) / <alpha-value>)',
                                    text: 'rgb(var(--brand-text) / <alpha-value>)',
                                    muted: 'rgb(var(--brand-muted) / <alpha-value>)',
                                    border: 'rgb(var(--brand-border) / <alpha-value>)'
                                }
                            },
                            fontFamily: {
                                sans: ['"Space Grotesk"', 'sans-serif'],
                            }
                        }
                    }
                }
            </script>
            <script src="https://cdn.tailwindcss.com"></script>
            <style type="text/tailwindcss">
                @layer base {
                  :root {
                    --brand-dark: 248 250 252;
                    --brand-darker: 241 245 249;
                    --brand-card: 255 255 255;
                    --brand-green: 101 163 13;
                    --brand-cyan: 8 145 178;
                    --brand-text: 15 23 42;
                    --brand-muted: 100 116 139;
                    --brand-border: 226 232 240;
                  }
                  .dark {
                    --brand-dark: 9 10 15;
                    --brand-darker: 6 7 10;
                    --brand-card: 18 20 29;
                    --brand-green: 163 230 53;
                    --brand-cyan: 34 211 238;
                    --brand-text: 248 250 252;
                    --brand-muted: 148 163 184;
                    --brand-border: 30 41 59;
                  }
                }
                @layer components {
                  .card { @apply bg-brand-card border border-brand-border rounded-xl shadow-sm overflow-hidden transition-colors duration-300; }
                  .input { @apply flex h-10 w-full rounded-md border border-brand-border bg-transparent px-3 py-2 text-sm text-brand-text placeholder:text-brand-muted focus:outline-none focus:ring-2 focus:ring-brand-cyan focus:border-transparent disabled:cursor-not-allowed disabled:opacity-50 transition-all; }
                  .btn { @apply inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-brand-cyan disabled:pointer-events-none disabled:opacity-50 h-9 px-4 py-2; }
                  .btn-primary { @apply bg-brand-green text-brand-dark hover:bg-[#b0f53f] font-bold shadow-lg shadow-brand-green/20; }
                  .btn-secondary { @apply bg-brand-border text-brand-text hover:bg-brand-border/80; }
                  .btn-ghost { @apply hover:bg-brand-border hover:text-brand-text; }
                }
            </style>
            <!-- Logo -->
            <div class="mb-8">
                <a href="{% url 'dashboard:home' %}"
                    class="flex items-center gap-2 transition-opacity hover:opacity-80">
                    <div
                        class="flex h-10 w-10 items-center justify-center rounded-lg bg-gradient-to-br from-brand-green to-brand-cyan shadow-lg shadow-brand-green/20">
                        <svg class="h-6 w-6 text-brand-dark" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <span class="text-2xl font-bold tracking-tight text-brand-text">StreamFlow</span>
                </a>
            </div>

            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Decorative Side Graphic -->
    <div class="relative hidden w-0 flex-1 lg:block border-l border-brand-border/30 bg-brand-darker">
        <div
            class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-brand-cyan/10 via-brand-darker to-brand-darker">
        </div>
        <!-- Abstract decorative elements -->
        <div class="absolute inset-0 flex items-center justify-center opacity-20">
            <svg class="w-full h-full max-w-2xl" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="400" cy="400" r="300" stroke="#a3e635" stroke-width="2" stroke-dasharray="8 8" />
                <circle cx="400" cy="400" r="200" stroke="#22d3ee" stroke-width="1" />
                <circle cx="400" cy="400" r="100" stroke="#a3e635" stroke-width="4" />
            </svg>
        </div>

        <!-- Floating Data Mockup -->
        <div
            class="absolute bottom-20 right-20 w-80 rounded-xl border border-brand-border/50 bg-brand-card/80 p-6 shadow-2xl backdrop-blur-sm border-l-brand-cyan">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 rounded-full bg-brand-green/20 flex items-center justify-center">
                    <svg class="w-4 h-4 text-brand-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-brand-text">Auto-Post Deployed</p>
                    <p class="text-xs text-brand-muted">Just now via Telegram</p>
                </div>
            </div>
            <div class="space-y-2">
                <div class="h-2 w-full rounded bg-brand-border"></div>
                <div class="h-2 w-4/5 rounded bg-brand-border"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
