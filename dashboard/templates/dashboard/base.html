{% load static %}
<!DOCTYPE html>
<html lang="en" x-data="{ theme: localStorage.getItem('theme') || 'dark' }" :class="theme === 'dark' ? 'dark' : ''">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StreamFlow - Enterprise Telegram E-Commerce Automation{% endblock %}</title>

    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <!-- Tailwind Output -->
    <link rel="stylesheet" href="{% static 'css/output.css' %}">

    <!-- Alpine.js for lightweight interactions (Modals, Dropdowns, Sidebars) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    {% block extra_head %}{% endblock %}
</head>

<body
    class="bg-brand-dark text-brand-text font-sans antialiased selection:bg-brand-cyan/30 selection:text-brand-cyan min-h-screen flex flex-col transition-colors duration-300">

    {% block body %}{% endblock %}

    {% block extra_scripts %}{% endblock %}
</body>

</html>
