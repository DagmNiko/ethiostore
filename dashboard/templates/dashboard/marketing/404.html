{% extends 'dashboard/base.html' %}
{% load static %}

{% block title %}Page Not Found - StreamFlow{% endblock %}

{% block body %}
<main class="grid min-h-full place-items-center bg-brand-darker px-6 py-24 sm:py-32 lg:px-8">
    <div class="text-center">
        <p class="text-base font-semibold text-brand-cyan">404</p>
        <h1 class="mt-4 text-3xl font-bold tracking-tight text-brand-text sm:text-5xl">Page not found</h1>
        <p class="mt-6 text-base leading-7 text-brand-muted">Sorry, we couldn’t find the page you’re looking for. It
            might have been moved or deleted.</p>
        <div class="mt-10 flex items-center justify-center gap-x-6">
            <a href="{% url 'dashboard:home' %}" class="btn btn-primary">Go back home</a>
            <a href="{% url 'dashboard:contact' %}"
                class="text-sm font-semibold text-brand-text hover:text-brand-cyan transition-colors">Contact support <span
                    aria-hidden="true">&rarr;</span></a>
        </div>
    </div>
</main>
{% endblock %}
